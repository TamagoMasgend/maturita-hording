<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Kámen, nůžky, papír</title>
</head>
<body>
    <h1>Kámen, Nůžky, Papír</h1>
    
    <button onclick="hrat('kámen')">Kámen</button>
    <button onclick="hrat('nůžky')">Nůžky</button>
    <button onclick="hrat('papír')">Papír</button>

    <button onclick="resetovatSkore()">Reset Skóre</button> 
    <button onclick="vypsatSkore()">Vypsat skóre z Local Storage</button> 
    <p id="vypisStorage"></p> 

    <p id="vysledek">Zkus štěstí!</p>
    <p>Skóre: <span id="skore">0</span></p>
    <p>Skóre počítače: <span id="botSkore">0</span></p>
    
    <script>
        let celkoveSkore = parseInt(localStorage.getItem('skore')) || 0;
        let celkoveBotSkore = parseInt(localStorage.getItem('botSkore')) || 0;
        
        let koloBody = 0;
        let koloBotBody = 0;

        document.getElementById('skore').innerText = celkoveSkore;
        document.getElementById('botSkore').innerText = celkoveBotSkore;

        function hrat(moje) {
            if (koloBody >= 2 || koloBotBody >= 2) {
                koloBody = 0;
                koloBotBody = 0;
            }

            let moznosti = ['kámen', 'nůžky', 'papír'];
            let pocitac = moznosti[Math.floor(Math.random() * 3)];
            let vysledek = '';

            if (moje == pocitac) {
                vysledek = 'Remíza :/ Oba dali ' + moje;
            } else if (
                (moje == 'kámen' && pocitac == 'nůžky') || 
                (moje == 'nůžky' && pocitac == 'papír') || 
                (moje == 'papír' && pocitac == 'kámen')
            ) {
                vysledek = 'Výhra! Tvoje ' + moje + ' poráží ' + pocitac + '.';
                koloBody++;
            } else {
                vysledek = 'Prohra :( Počítač dal ' + pocitac;
                koloBotBody++;
            }
            
            vysledek += ' (Průběh kola: ' + koloBody + ' : ' + koloBotBody + ')';

            if (koloBody >= 2) {
                vysledek += ' -> Dosáhl jsi 2 bodů a získáváš celkový bod!';
                celkoveSkore++;
            } else if (koloBotBody >= 2) {
                vysledek += ' -> Počítač dosáhl 2 bodů a získává celkový bod.';
                celkoveBotSkore++;
            }

            localStorage.setItem('skore', celkoveSkore);
            localStorage.setItem('botSkore', celkoveBotSkore);
            document.getElementById('skore').innerText = celkoveSkore;
            document.getElementById('botSkore').innerText = celkoveBotSkore;
            document.getElementById('vysledek').innerText = vysledek;
        }

        
        function resetovatSkore() {
            localStorage.removeItem('skore');
            localStorage.removeItem('botSkore');
            celkoveSkore = 0;
            celkoveBotSkore = 0;
            koloBody = 0;
            koloBotBody = 0;
            document.getElementById('skore').innerText = celkoveSkore;
            document.getElementById('botSkore').innerText = celkoveBotSkore;
            document.getElementById('vysledek').innerText = "Skóre bylo vyresetováno!";
        }

        function vypsatSkore() {
            let ulozeneSkore = localStorage.getItem('skore') || 0;
            let ulozeneBotSkore = localStorage.getItem('botSkore') || 0;
            document.getElementById('vypisStorage').innerText = 'Tvoje skóre: ' + ulozeneSkore + '\nSkóre počítače: ' + ulozeneBotSkore;
        }
        
    </script>
</body>
</html>
